<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kali Linux Terminal</title>
    <style>
        * { 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        body { 
            background: #000; 
            color: #e0e0e0; 
            font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
            position: relative;
        }

        /* خلفية تنين Kali */
        #kali-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at center, rgba(30, 60, 120, 0.3) 0%, rgba(0,0,0,0.95) 70%),
                #000;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #kali-bg svg {
            width: 60vmin;
            height: 60vmin;
            opacity: 0.85;
            filter: drop-shadow(0 0 30px rgba(80, 150, 255, 0.4));
        }

        /* شريط المهام العلوي */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 28px;
            background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
            color: #ddd;
            z-index: 100;
            justify-content: space-between;
        }
        #top-bar .left, #top-bar .right { display: flex; gap: 15px; align-items: center; }
        #top-bar .logo { color: #5595d9; font-weight: bold; }
        #top-bar .menu { cursor: pointer; }
        #top-bar .menu:hover { color: #fff; }

        /* أيقونة الترمينال */
        #term-icon { 
            position: fixed; 
            bottom: 50px; 
            right: 20px; 
            cursor: pointer; 
            width: 56px; 
            height: 56px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            z-index: 50;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        #term-icon:hover {
            background: #2a2a2a;
            border-color: #5595d9;
            transform: translateY(-2px);
        }

        /* النافذة العائمة */
        #term-window { 
            position: fixed; 
            top: 40px; 
            left: 20px; 
            width: 75%; 
            height: 75%;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid #1a1a1a;
            border-radius: 8px 8px 4px 4px;
            display: none;
            flex-direction: column;
            resize: both;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            z-index: 60;
        }

        /* شريط عنوان النافذة */
        #term-header {
            background: linear-gradient(to bottom, #3c3c3c, #2a2a2a);
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
            border-bottom: 1px solid #111;
            user-select: none;
            flex-shrink: 0;
        }
        #term-title {
            color: #ddd;
            font-size: 12px;
            flex: 1;
            text-align: center;
        }
        #term-buttons {
            display: flex;
            gap: 6px;
        }
        .win-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 0;
        }
        .btn-close { background: #ff5f56; }
        .btn-min { background: #ffbd2e; }
        .btn-max { background: #27c93f; }
        .win-btn:hover { filter: brightness(1.2); }

        /* قائمة الترمينال */
        #term-menu {
            background: #2a2a2a;
            padding: 3px 10px;
            font-size: 11px;
            color: #aaa;
            border-bottom: 1px solid #111;
            flex-shrink: 0;
        }
        #term-menu span { margin-right: 15px; cursor: pointer; }
        #term-menu span:hover { color: #fff; }

        /* منطقة المخرجات - قابلة للتمرير */
        #output { 
            flex: 1; 
            padding: 12px 14px; 
            overflow-y: auto; 
            overflow-x: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.5;
            color: #e0e0e0;
            direction: ltr;
            text-align: left;
            -webkit-overflow-scrolling: touch;
        }
        #output::-webkit-scrollbar { width: 10px; }
        #output::-webkit-scrollbar-track { background: #1a1a1a; }
        #output::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

        /* ألوان الترمينال */
        .prompt-bracket { color: #e0e0e0; }
        .prompt-user { color: #5595d9; font-weight: bold; }
        .prompt-path { color: #4fa8e0; font-weight: bold; }
        .prompt-sym { color: #e0e0e0; font-weight: bold; }
        .cmd-text { color: #fff; }
        .output-text { color: #c8c8c8; }
        .error-text { color: #ff5555; }
        .success-text { color: #50fa7b; }

        /* سطر الإدخال - ثابت في الأسفل */
        #input-line { 
            display: flex; 
            padding: 8px 14px; 
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #1a1a1a;
            align-items: center;
            direction: ltr;
            flex-shrink: 0;
            min-height: 40px;
        }
        #prompt-static {
            white-space: pre;
            font-size: 13px;
            margin-right: 8px;
            line-height: 1.5;
        }
        #cmd { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            outline: none;
            font-family: inherit;
            font-size: 16px; /* مهم لمنع التكبير التلقائي في iOS */
            caret-color: #5595d9;
            padding: 0;
            margin: 0;
            -webkit-appearance: none;
            appearance: none;
        }

        /* شريط الحالة السفلي */
        #status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 24px;
            background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
            border-top: 1px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 11px;
            color: #aaa;
            z-index: 100;
            justify-content: space-between;
        }

        /* مؤشر الكتابة */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- خلفية تنين Kali -->
    <div id="kali-bg">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#5595d9;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#3a6fa8;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="url(#dragonGrad)" d="M256 40 C 180 60, 140 120, 150 200 C 120 210, 90 240, 100 280 C 70 290, 60 330, 90 360 C 80 390, 110 420, 150 410 C 170 450, 220 470, 260 450 C 290 480, 350 470, 370 430 C 410 440, 440 410, 420 370 C 450 350, 450 300, 420 280 C 440 250, 420 210, 380 210 C 390 160, 360 110, 310 100 C 300 70, 280 40, 256 40 Z M 200 180 Q 220 170, 230 190 Q 210 200, 200 180 Z M 310 180 Q 330 170, 340 190 Q 320 200, 310 180 Z M 230 260 Q 256 280, 282 260 Q 270 300, 256 310 Q 242 300, 230 260 Z"/>
            <path fill="url(#dragonGrad)" opacity="0.7" d="M 150 200 Q 80 180, 50 230 Q 100 240, 130 260 Z"/>
            <path fill="url(#dragonGrad)" opacity="0.7" d="M 362 200 Q 432 180, 462 230 Q 412 240, 382 260 Z"/>
        </svg>
    </div>

    <!-- شريط المهام العلوي -->
    <div id="top-bar">
        <div class="left">
            <span class="logo">🐉 Kali</span>
            <span class="menu">Applications</span>
            <span class="menu">Places</span>
            <span class="menu">System</span>
        </div>
        <div class="right">
            <span>🔊</span>
            <span>🌐</span>
            <span>🔋</span>
            <span id="clock"></span>
        </div>
    </div>

    <!-- أيقونة الترمينال -->
    <div id="term-icon" onclick="openTerminal()">
        🖥️
    </div>

    <!-- نافذة الترمينال -->
    <div id="term-window">
        <div id="term-header">
            <div id="term-buttons">
                <div class="win-btn btn-close" onclick="closeTerminal()"></div>
                <div class="win-btn btn-min"></div>
                <div class="win-btn btn-max"></div>
            </div>
            <div id="term-title">root@kali: ~</div>
            <div style="width: 60px;"></div>
        </div>
        <div id="term-menu">
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Terminal</span>
            <span>Help</span>
        </div>
        
        <!-- منطقة المخرجات القابلة للتمرير -->
        <div id="output"></div>
        
        <!-- سطر الإدخال الثابت في الأسفل -->
        <div id="input-line">
            <span id="prompt-static">
<span class="prompt-bracket">┌──(</span><span class="prompt-user">root㉿kali</span><span class="prompt-bracket">)-[</span><span class="prompt-path">~</span><span class="prompt-bracket">]</span>
<span class="prompt-bracket">└─</span><span class="prompt-sym">#</span> </span>
            <input type="text" id="cmd" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
    </div>

    <!-- شريط الحالة -->
    <div id="status-bar">
        <span>root@kali: ~</span>
        <span id="status-right">UTF-8 | 80x24</span>
    </div>

    <script>
        // عرض الساعة
        function updateClock() {
            const now = new Date();
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const time = now.toLocaleTimeString('en-US', {hour12: false});
            document.getElementById('clock').textContent = 
                days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate() + ' ' + time;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // فتح الترمينال
        function openTerminal() {
            document.getElementById('term-window').style.display = 'flex';
            setTimeout(() => document.getElementById('cmd').focus(), 100);
        }

        // إغلاق الترمينال
        function closeTerminal() {
            document.getElementById('term-window').style.display = 'none';
        }

        // رسالة الترحيب
        const welcome = `<span class="success-text">┌──────────────────────────────────────────────────────────┐
│  Welcome to Kali Linux GNU/Linux Rolling               │
│  Documentation: https://www.kali.org/docs/             │
│  Updated: Fri Jun 19 12:00:00 UTC 2026                 │
└──────────────────────────────────────────────────────────┘</span>

<span class="output-text">Last login: Fri Jun 19 11:45:22 2026 on tty1</span>

`;
        document.getElementById('output').innerHTML = welcome;

        // معالجة الأوامر
        document.getElementById('cmd').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cmd = e.target.value;
                const output = document.getElementById('output');
                
                // إضافة الأمر المدخل مع الـ prompt
                const cmdLine = `<span class="prompt-bracket">┌──(</span><span class="prompt-user">root㉿kali</span><span class="prompt-bracket">)-[</span><span class="prompt-path">~</span><span class="prompt-bracket">]</span>\n<span class="prompt-bracket">└─</span><span class="prompt-sym">#</span> <span class="cmd-text">${escapeHtml(cmd)}</span>\n`;
                output.innerHTML += cmdLine;
                
                try {
                    const res = await fetch('/execute', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({cmd})
                    });
                    const data = await res.json();
                    const isError = data.error || data.status === 'error';
                    const cls = isError ? 'error-text' : 'output-text';
                    const resultText = escapeHtml(data.output || data.error || 'OK');
                    output.innerHTML += `<span class="${cls}">${resultText}</span>\n\n`;
                } catch (err) {
                    output.innerHTML += `<span class="error-text">Connection error: ${escapeHtml(err.message)}</span>\n\n`;
                }
                
                e.target.value = '';
                output.scrollTop = output.scrollHeight;
            }
        });

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        // سحب النافذة
        const win = document.getElementById('term-window');
        const header = document.getElementById('term-header');
        let isDragging = false, offsetX = 0, offsetY = 0;
        header.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('win-btn')) return;
            isDragging = true;
            offsetX = e.clientX - win.offsetLeft;
            offsetY = e.clientY - win.offsetTop;
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
        });
        document.addEventListener('mouseup', () => isDragging = false);

        // منع التكبير عند التركيز على input
        document.getElementById('cmd').addEventListener('focus', () => {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        });
    </script>
</body>
</html>
